name: Starter bug
description: Report a reproducible defect in the green starter baseline.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include the exact command and complete non-secret error output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js and npm versions
      placeholder: Node 24.x, npm 11.x
    validations:
      required: true
