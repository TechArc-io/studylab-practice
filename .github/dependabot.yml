version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      runtime:
        patterns: ["next", "react", "react-dom", "zod"]
      testing-and-tooling:
        dependency-type: development
        patterns: ["*"]
    ignore:
      # Next.js 16's lint preset currently depends on the ESLint 9 API. Keep
      # patch/minor updates flowing without opening a known-incompatible major.
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
