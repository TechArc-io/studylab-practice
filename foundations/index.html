<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astudylab foundations practice</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a href="#main-content">Skip to content</a>
      <p class="brand">Astudylab Practice</p>
    </header>
    <main id="main-content">
      <h1>Frontend practice journal</h1>
      <p>Use this framework-free page to practice semantic HTML, responsive CSS, and browser JavaScript.</p>
      <section aria-labelledby="reflection-heading">
        <h2 id="reflection-heading">Today&apos;s reflection</h2>
        <form id="reflection-form">
          <label for="reflection">What did you verify yourself?</label>
          <textarea id="reflection" name="reflection" rows="4" required></textarea>
          <button type="submit">Save reflection</button>
        </form>
        <p id="form-status" role="status" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
